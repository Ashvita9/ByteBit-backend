# ByteBit Backend — Nginx reverse-proxy config
#
# Place at: /etc/nginx/sites-available/bytebit-backend
# Enable:   sudo ln -s /etc/nginx/sites-available/bytebit-backend \
#                      /etc/nginx/sites-enabled/bytebit-backend
#
# Replace YOUR_DOMAIN_OR_IP with your VM's external IP or domain name.
# For HTTPS: run  sudo certbot --nginx -d your.domain.com

upstream daphne {
    server unix:/run/bytebit/daphne.sock fail_timeout=0;
}

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    # ── Static files served directly by Nginx ──────────────────────────────
    location /static/ {
        alias /opt/bytebit/app/ByteBit-backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # ── WebSocket upgrade ────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass         http://daphne;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── All other traffic → Daphne ───────────────────────────────────────────
    location / {
        proxy_pass         http://daphne;
        proxy_redirect     off;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # Security headers
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";
    }

    # ── Health check (used by GitHub Actions / load balancers) ───────────────
    location = /api/health/ {
        proxy_pass http://daphne;
        access_log off;
    }

    client_max_body_size 20M;
    keepalive_timeout    65;
}
