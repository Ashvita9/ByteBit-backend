# ByteBit Backend — Nginx reverse-proxy config
#
# Place at: /etc/nginx/sites-available/bytebit-backend
# Enable:   sudo ln -s /etc/nginx/sites-available/bytebit-backend \
#                      /etc/nginx/sites-enabled/bytebit-backend

upstream daphne {
    server 127.0.0.1:8000 fail_timeout=0;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name 35.200.152.58 bytebitsbackend.duckdns.org;
    return 301 https://bytebitsbackend.duckdns.org$request_uri;
}

server {
    listen 443 ssl;
    server_name bytebitsbackend.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/bytebitsbackend.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bytebitsbackend.duckdns.org/privkey.pem;

    # ── Static files served directly by Nginx ──────────────────────────────
    location /static/ {
        alias /opt/bytebit/app/ByteBit-backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # ── WebSocket upgrade ────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass         http://daphne;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── All other traffic → Daphne ───────────────────────────────────────────
    location / {
        proxy_pass         http://daphne;
        proxy_redirect     off;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # Security headers
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-XSS-Protection "1; mode=block";
    }

    # ── Health check ─────────────────────────────────────────────────────────
    location = /api/health/ {
        proxy_pass http://daphne;
        access_log off;
    }

    client_max_body_size 20M;
    keepalive_timeout    65;
}